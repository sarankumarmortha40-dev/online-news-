<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports News</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #222;
    }
    .news-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .news-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      width: 300px;
      padding: 15px;
      transition: 0.3s;
    }
    .news-card:hover {
      transform: translateY(-5px);
    }
    .news-card img {
      width: 100%;
      border-radius: 10px;
      height: 180px;
      object-fit: cover;
    }
    .news-card h2 {
      font-size: 18px;
      color: #333;
      margin-top: 10px;
    }
    .news-card p {
      font-size: 14px;
      color: #555;
    }
    .news-card a {
      color: #007bff;
      text-decoration: none;
    }
    .news-card a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Sports News</h1>

  <div class="news-container">
    {% for article in articles %}
      <div class="news-card">
        {% if article.image %}
          <img src="{{ article.image }}" alt="News Image">
        {% else %}
          <img src="{{ url_for('static', filename='no-image.png') }}" alt="No image available">
        {% endif %}
        <h2>{{ article.title }}</h2>
        <p><strong>By:</strong> {{ article.author or "Unknown" }}</p>
        <p>{{ article.description }}</p>
        <p><strong>Source:</strong> {{ article.source }}</p>
        <a href="{{ url_for('article_page', category=category, id=loop.index0) }}">
    Read more →
</a>

      </div>
    {% endfor %}
  </div>
</body>
</html>
